<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Collection — 아니아</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="header-placeholder"></div>

<div style="max-width:960px;margin:0 auto;padding:40px 24px 0">
  <!-- 시즌 탭 -->
  <div class="season-tabs" id="season-tabs"></div>

  <!-- 선택된 시즌 헤더 -->
  <div class="season-header" id="season-header"></div>

  <!-- 사진 스택 -->
  <div class="season-photos" id="season-photos"></div>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="/js/config.js"></script>
<script>
(function () {
  const tabsEl   = document.getElementById('season-tabs');
  const headerEl = document.getElementById('season-header');
  const photosEl = document.getElementById('season-photos');

  if (!SEASONS.length) {
    photosEl.innerHTML = '<div class="season-empty">준비 중입니다.</div>';
    return;
  }

  // URL hash 또는 첫 번째 시즌 선택
  let currentSlug = location.hash.replace('#', '') || SEASONS[0].slug;
  if (!SEASONS.find(s => s.slug === currentSlug)) currentSlug = SEASONS[0].slug;

  // 탭 렌더링
  function renderTabs() {
    tabsEl.innerHTML = SEASONS.map(s => `
      <button class="season-tab ${s.slug === currentSlug ? 'active' : ''}" data-slug="${s.slug}">
        ${s.label}
      </button>`).join('');
  }

  // 시즌 콘텐츠 렌더링
  function renderSeason(slug) {
    const s = SEASONS.find(s => s.slug === slug);
    if (!s) return;

    headerEl.innerHTML = `
      <div class="season-header-label">${s.label}</div>
      <div class="season-header-title">${s.title || ''}</div>
      ${s.title_en ? `<div class="season-header-en">${s.title_en}</div>` : ''}`;

    if (!s.photos || !s.photos.length) {
      photosEl.innerHTML = '<div class="season-empty">사진을 준비 중입니다.<br>admin-seasons.html에서 추가하세요.</div>';
      return;
    }

    photosEl.innerHTML = s.photos.map((p, i) => `
      <a class="season-photo-item" href="#" data-i="${i}" data-slug="${slug}">
        <img src="${p.url}" alt="${p.caption || s.label + ' ' + (i + 1)}" loading="lazy">
      </a>`).join('');
  }

  function activate(slug) {
    currentSlug = slug;
    location.hash = slug;
    renderTabs();
    renderSeason(slug);
    tabsEl.querySelector(`[data-slug="${slug}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  renderTabs();
  renderSeason(currentSlug);

  // 탭 클릭
  tabsEl.addEventListener('click', e => {
    const btn = e.target.closest('.season-tab');
    if (btn) activate(btn.dataset.slug);
  });

  // 라이트박스
  const lightbox    = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  photosEl.addEventListener('click', e => {
    const item = e.target.closest('.season-photo-item');
    if (!item) return;
    e.preventDefault();
    const s = SEASONS.find(s => s.slug === item.dataset.slug);
    if (!s) return;
    const photo = s.photos[Number(item.dataset.i)];
    if (!photo) return;
    lightboxImg.src = photo.url;
    lightboxImg.alt = photo.caption || '';
    lightbox.classList.add('open');
  });

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
})();
</script>
<script src="/js/nav.js"></script>
<script src="/js/cursor.js"></script>
<div id="ship-cursor"></div>
</body>
</html>
