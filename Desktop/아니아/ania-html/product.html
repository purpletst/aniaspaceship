<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>상품 — 아니아</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="header-placeholder"></div>

<div class="product-layout">
  <div id="product-gallery" class="product-gallery"></div>
  <div class="product-info-panel">
    <div id="product-info"></div>
  </div>
</div>

<script src="/js/config.js"></script>
<script>
const ALL_SIZES = ['XS','S','M','L','XL','FREE'];
let selectedSize = null;
let product = null;

async function load() {
  const id = new URLSearchParams(location.search).get('id');
  const gallery = document.getElementById('product-gallery');
  const info    = document.getElementById('product-info');

  if (!id) {
    info.innerHTML = '<p style="padding:40px;font-size:12px">상품을 찾을 수 없습니다.</p>';
    return;
  }

  // 로컬 시드 우선, API로 덮어씀
  let p = SEED_PRODUCTS.find(x => String(x.id) === id) || null;
  const res = await apiFetch(`${API}/products.php?action=single&id=${id}`);
  if (res.ok && res.data) p = res.data;

  if (!p) {
    info.innerHTML = '<p style="padding:40px;font-size:12px">상품을 찾을 수 없습니다.</p>';
    return;
  }
  product = p;

  const thumbs  = typeof p.images === 'string' ? JSON.parse(p.images) : (p.images || []);
  const details = typeof p.detail_images === 'string'
    ? JSON.parse(p.detail_images)
    : (p.detail_images || []);
  const sold = !p.is_available || p.stock <= 0;
  const availSizes = (p.sizes && p.sizes.length) ? p.sizes : ALL_SIZES;

  document.title = `${p.name_ko || p.name} — 아니아`;

  // ── 갤러리: 상세 이미지 우선, 없으면 대표 이미지 ──
  const galleryImages = details.length ? details : thumbs;
  gallery.innerHTML = galleryImages.length
    ? galleryImages.map(url => `<img src="${url}" alt="${p.name}" loading="lazy">`).join('')
    : '<div class="product-gallery-placeholder"></div>';

  // ── 정보 패널 ──
  info.innerHTML = `
    <div class="product-info-season">26 F/W</div>
    <h1 class="product-info-name">${p.name}</h1>
    <p class="product-info-name-ko">${p.name_ko || ''}</p>
    <p class="product-info-price">${fmtPrice(p.price)}</p>
    ${!sold ? `
      <p class="size-label">SIZE</p>
      <div class="size-btns" id="size-btns">
        ${availSizes.map(s => `<button class="size-btn" data-size="${s}">${s}</button>`).join('')}
      </div>
      <button class="cart-btn" id="cart-btn">ADD TO CART</button>
    ` : ''}
    <button class="buy-btn" id="buy-btn" ${sold ? 'disabled' : ''}>${sold ? 'SOLD OUT' : '구매하기'}</button>
    <p class="buy-msg" id="buy-msg"></p>
    ${p.description ? `<p style="margin-top:28px;font-size:11px;line-height:1.9;color:#555">${p.description}</p>` : ''}`;

  // 사이즈 버튼
  document.getElementById('size-btns')?.addEventListener('click', e => {
    const btn = e.target.closest('.size-btn');
    if (!btn) return;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSize = btn.dataset.size;
  });

  // 장바구니
  document.getElementById('cart-btn')?.addEventListener('click', () => {
    const msg = document.getElementById('buy-msg');
    if (!selectedSize) { msg.textContent = '사이즈를 선택해주세요.'; msg.className = 'buy-msg'; return; }
    cartAdd({ id: p.id, name: p.name, name_ko: p.name_ko || '', price: p.price, image: thumbs[0] || '', size: selectedSize });
    msg.textContent = '장바구니에 담았습니다.';
    msg.className = 'buy-msg buy-success';
  });

  // 구매하기
  document.getElementById('buy-btn')?.addEventListener('click', handleBuy);
}

async function handleBuy() {
  const msg = document.getElementById('buy-msg');
  if (!selectedSize) { msg.textContent = '사이즈를 선택해주세요.'; msg.className = 'buy-msg'; return; }

  const authRes = await apiFetch(`${API}/auth.php?action=check`);
  if (!authRes.ok || !authRes.data) {
    location.href = `/login.html?return=${encodeURIComponent(location.pathname + location.search)}`;
    return;
  }

  const btn = document.getElementById('buy-btn');
  btn.disabled = true; btn.textContent = '처리 중...';

  const res = await apiFetch(`${API}/orders.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      items: [{ product_id: product.id, product_name: product.name, size: selectedSize, quantity: 1, unit_price: product.price }],
    }),
  });

  if (res.ok) {
    btn.textContent = '✓ 주문 완료';
    msg.textContent = '주문이 완료되었습니다.';
    msg.className = 'buy-msg buy-success';
  } else {
    btn.disabled = false; btn.textContent = '구매하기';
    msg.textContent = res.error || '오류가 발생했습니다.';
    msg.className = 'buy-msg';
  }
}

load();
</script>
<script src="/js/nav.js"></script>
<div id="ship-cursor"></div>
<script src="/js/cursor.js"></script>
</body>
</html>
