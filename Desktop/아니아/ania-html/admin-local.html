<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로컬 상품 관리 — 아니아</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="header-placeholder"></div>

<div class="local-admin-wrap">
  <div class="admin-header">
    <h1 class="admin-title">LOCAL PRODUCT ADMIN</h1>
    <button class="admin-add-btn" id="add-btn">+ 상품 추가</button>
  </div>

  <div class="local-admin-notice">
    <strong>DB 없이 작동하는 로컬 상품 관리자입니다.</strong><br>
    상품 데이터는 이 브라우저의 <code>localStorage</code>에 저장됩니다.
    카페24 DB 연결 후에는 <a href="/admin/products.php">PHP 어드민</a>을 사용하세요.<br>
    <strong>내보내기</strong> 버튼으로 JSON을 복사해 카페24 phpMyAdmin에 직접 입력할 수 있습니다.
  </div>

  <p class="admin-count" id="product-count"></p>

  <table class="admin-table" id="product-table">
    <thead>
      <tr>
        <th>썸네일</th>
        <th>상품명 (EN)</th>
        <th>상품명 (KO)</th>
        <th>카테고리</th>
        <th>가격</th>
        <th>사이즈</th>
        <th>재고</th>
        <th>판매중</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody id="product-tbody"></tbody>
  </table>

  <div style="margin-top:32px;display:flex;gap:12px">
    <button class="save-btn" id="export-btn">JSON 내보내기</button>
    <button class="save-btn" style="background:#c00" id="reset-btn">기본값으로 초기화</button>
  </div>
</div>

<!-- 상품 편집 모달 -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <h2 class="modal-title" id="modal-title">상품 추가</h2>
    <div class="modal-grid">
      <div class="modal-field">
        <label>상품명 (EN) *</label>
        <input id="f-name" placeholder="SATIN BLOUSE SET">
      </div>
      <div class="modal-field">
        <label>상품명 (KO)</label>
        <input id="f-name-ko" placeholder="새틴 블라우스 세트">
      </div>
      <div class="modal-field">
        <label>카테고리</label>
        <select id="f-cat">
          <option value="tops">TOPS</option>
          <option value="outerwear">OUTERWEAR</option>
          <option value="bottoms">BOTTOMS</option>
          <option value="dresses">DRESSES</option>
          <option value="accessories">ACCESSORIES</option>
          <option value="etc">ETC</option>
        </select>
      </div>
      <div class="modal-field">
        <label>가격 (원)</label>
        <input id="f-price" type="number" min="0" placeholder="298000">
      </div>
      <div class="modal-field">
        <label>재고</label>
        <input id="f-stock" type="number" min="0" placeholder="10">
      </div>
      <div class="modal-field">
        <label>판매 상태</label>
        <select id="f-avail">
          <option value="1">판매중</option>
          <option value="0">품절/비활성</option>
        </select>
      </div>
      <!-- 사이즈 -->
      <div class="modal-field full-width">
        <label>판매 사이즈 <span style="font-weight:normal;color:#aaa;font-size:10px">(선택 안 함 = 전체)</span></label>
        <div class="local-size-checks" id="f-sizes">
          <label class="local-size-label"><input type="checkbox" value="XS"> XS</label>
          <label class="local-size-label"><input type="checkbox" value="S"> S</label>
          <label class="local-size-label"><input type="checkbox" value="M"> M</label>
          <label class="local-size-label"><input type="checkbox" value="L"> L</label>
          <label class="local-size-label"><input type="checkbox" value="XL"> XL</label>
          <label class="local-size-label"><input type="checkbox" value="FREE"> FREE</label>
        </div>
      </div>
      <!-- 대표 이미지 -->
      <div class="modal-field full-width">
        <label>대표 이미지 <span style="font-weight:normal;color:#aaa;font-size:10px">쇼핑몰 목록 + 상품 상단</span></label>
        <div id="thumb-grid" class="img-grid"></div>
        <input type="file" id="thumb-file-input"
          accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
        <button type="button" id="thumb-add-btn" class="btn-img-add">+ 대표 이미지 추가</button>
        <p id="thumb-upload-msg" style="font-size:11px;color:#888;margin-top:4px"></p>
      </div>
      <!-- 상세 이미지 -->
      <div class="modal-field full-width">
        <label>상세 이미지 <span style="font-weight:normal;color:#aaa;font-size:10px">상품 페이지 하단 에디토리얼</span></label>
        <div id="detail-grid" class="img-grid"></div>
        <input type="file" id="detail-file-input"
          accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
        <button type="button" id="detail-add-btn" class="btn-img-add">+ 상세 이미지 추가</button>
        <p id="detail-upload-msg" style="font-size:11px;color:#888;margin-top:4px"></p>
      </div>
      <div class="modal-field full-width">
        <label>상품 설명</label>
        <textarea id="f-desc" rows="3" placeholder="상품 설명을 입력하세요."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-save" id="modal-save">저장</button>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script>
const CATS     = { tops:'TOPS', outerwear:'OUTERWEAR', bottoms:'BOTTOMS', dresses:'DRESSES', accessories:'ACCESSORIES', etc:'ETC' };
const ALL_SIZES = ['XS','S','M','L','XL','FREE'];
let editingIdx       = null;
let modalThumbs      = [];   // 대표 이미지
let modalDetailImgs  = [];   // 상세 이미지

// ── 공통 이미지 그리드 렌더 ──────────────────────────────
function renderImgGrid(gridId, arr) {
  const grid = document.getElementById(gridId);
  if (!arr.length) {
    grid.innerHTML = '<p style="font-size:11px;color:#aaa;padding:8px 0">이미지 없음</p>';
    return;
  }
  grid.innerHTML = arr.map((url, i) => `
    <div class="img-thumb-wrap">
      <img src="${url}" alt="" onerror="this.style.display='none'">
      <button type="button" class="img-thumb-del" data-grid="${gridId}" data-i="${i}">✕</button>
    </div>`).join('');
  grid.querySelectorAll('.img-thumb-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.grid === 'thumb-grid' ? modalThumbs : modalDetailImgs;
      target.splice(Number(btn.dataset.i), 1);
      renderImgGrid(btn.dataset.grid, target);
    });
  });
}

// ── 공통 업로드 핸들러 ────────────────────────────────────
async function handleImgUpload(file, gridId, arr, msgId) {
  const msgEl = document.getElementById(msgId);
  msgEl.textContent = '업로드 중...';
  const result = await uploadImage(file);
  if (!result.ok) { msgEl.textContent = result.error; return; }
  msgEl.textContent = result.warning || (result.source === 'server' ? '서버 업로드 완료' : '로컬 저장 (base64)');
  arr.push(result.url);
  renderImgGrid(gridId, arr);
}

// 대표 이미지
document.getElementById('thumb-add-btn').addEventListener('click', () => {
  document.getElementById('thumb-file-input').click();
});
document.getElementById('thumb-file-input').addEventListener('change', function() {
  if (!this.files[0]) return;
  handleImgUpload(this.files[0], 'thumb-grid', modalThumbs, 'thumb-upload-msg');
  this.value = '';
});

// 상세 이미지
document.getElementById('detail-add-btn').addEventListener('click', () => {
  document.getElementById('detail-file-input').click();
});
document.getElementById('detail-file-input').addEventListener('change', function() {
  if (!this.files[0]) return;
  handleImgUpload(this.files[0], 'detail-grid', modalDetailImgs, 'detail-upload-msg');
  this.value = '';
});

// ── localStorage ──────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem('aniaLocalProducts') || '[]'); }
  catch { return []; }
}
function save(products) {
  localStorage.setItem('aniaLocalProducts', JSON.stringify(products));
}
function nextId(products) {
  return products.length ? Math.max(...products.map(p => p.id || 0)) + 1 : 1;
}

// ── 테이블 렌더 ───────────────────────────────────────────
function renderTable() {
  const products = load();
  document.getElementById('product-count').textContent = `총 ${products.length}개 상품 (localStorage 저장)`;

  const tbody = document.getElementById('product-tbody');
  if (!products.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:#888;font-size:11px">상품이 없습니다. 추가 버튼을 눌러 상품을 등록하세요.</td></tr>`;
    return;
  }

  tbody.innerHTML = products.map((p, i) => {
    const imgs  = Array.isArray(p.images) ? p.images : (p.images ? JSON.parse(p.images) : []);
    const thumb = imgs[0] || '';
    const sizes = p.sizes ? p.sizes.join(' ') : '—';
    return `<tr>
      <td><div class="admin-thumb">${thumb ? `<img src="${thumb}" alt="">` : ''}</div></td>
      <td>${p.name}</td>
      <td>${p.name_ko || ''}</td>
      <td>${CATS[p.category] || p.category}</td>
      <td>${Number(p.price).toLocaleString('ko-KR')}원</td>
      <td style="font-size:10px">${sizes}</td>
      <td>${p.stock}</td>
      <td><span class="${p.is_available ? 'badge-on' : 'badge-off'}">${p.is_available ? '판매중' : '비활성'}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn-edit" data-i="${i}">편집</button>
        <button class="btn-del" data-i="${i}">삭제</button>
      </td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openModal(Number(btn.dataset.i)));
  });
  tbody.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('삭제하시겠습니까?')) return;
      const products = load();
      products.splice(Number(btn.dataset.i), 1);
      save(products);
      renderTable();
    });
  });
}

// ── 사이즈 체크박스 헬퍼 ─────────────────────────────────
function getSizes() {
  return [...document.querySelectorAll('#f-sizes input:checked')].map(cb => cb.value);
}
function setSizes(arr) {
  document.querySelectorAll('#f-sizes input').forEach(cb => {
    cb.checked = Array.isArray(arr) && arr.includes(cb.value);
  });
}

// ── 모달 열기 ─────────────────────────────────────────────
function openModal(idx = null) {
  editingIdx = idx;
  const modal    = document.getElementById('modal');
  const products = load();

  if (idx !== null) {
    const p = products[idx];
    document.getElementById('modal-title').textContent = '상품 편집';
    document.getElementById('f-name').value    = p.name;
    document.getElementById('f-name-ko').value = p.name_ko || '';
    document.getElementById('f-cat').value     = p.category;
    document.getElementById('f-price').value   = p.price;
    document.getElementById('f-stock').value   = p.stock;
    document.getElementById('f-avail').value   = p.is_available ? '1' : '0';
    document.getElementById('f-desc').value    = p.description || '';
    setSizes(p.sizes || null);
    modalThumbs     = [...(Array.isArray(p.images)        ? p.images        : [])];
    modalDetailImgs = [...(Array.isArray(p.detail_images) ? p.detail_images : [])];
  } else {
    document.getElementById('modal-title').textContent = '상품 추가';
    ['f-name','f-name-ko','f-price','f-stock','f-desc'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-cat').value   = 'tops';
    document.getElementById('f-avail').value = '1';
    setSizes(null);
    modalThumbs     = [];
    modalDetailImgs = [];
  }
  ['thumb-upload-msg','detail-upload-msg'].forEach(id => {
    document.getElementById(id).textContent = '';
  });
  renderImgGrid('thumb-grid',  modalThumbs);
  renderImgGrid('detail-grid', modalDetailImgs);
  modal.style.display = 'flex';
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none';
});

// ── 저장 ──────────────────────────────────────────────────
document.getElementById('modal-save').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('상품명을 입력하세요.'); return; }

  const sizes = getSizes();
  const item = {
    name,
    name_ko:       document.getElementById('f-name-ko').value.trim(),
    category:      document.getElementById('f-cat').value,
    price:         Number(document.getElementById('f-price').value) || 0,
    stock:         Number(document.getElementById('f-stock').value) || 0,
    is_available:  document.getElementById('f-avail').value === '1' ? 1 : 0,
    images:        [...modalThumbs],
    detail_images: [...modalDetailImgs],
    sizes:         sizes.length ? sizes : null,
    description:   document.getElementById('f-desc').value.trim(),
  };

  const products = load();
  if (editingIdx !== null) {
    item.id = products[editingIdx].id;
    products[editingIdx] = item;
  } else {
    item.id = nextId(products);
    products.push(item);
  }
  save(products);
  document.getElementById('modal').style.display = 'none';
  renderTable();
});

document.getElementById('add-btn').addEventListener('click', () => openModal(null));

document.getElementById('export-btn').addEventListener('click', () => {
  const json = JSON.stringify(load(), null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('JSON이 클립보드에 복사되었습니다.\n카페24 phpMyAdmin > products 테이블에 직접 삽입하거나,\n개발팀에 전달하세요.');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = json;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    alert('복사 완료!');
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('localStorage 상품을 모두 지우고 기본 시드 데이터로 초기화합니다.\n계속하시겠습니까?')) return;
  localStorage.removeItem('aniaLocalProducts');
  renderTable();
});

renderTable();
</script>
<script src="/js/nav.js"></script>
<script src="/js/cursor.js"></script>
<div id="ship-cursor"></div>
</body>
</html>
