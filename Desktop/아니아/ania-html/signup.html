<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>회원가입 — 아니아</title>
<link rel="stylesheet" href="/css/style.css">
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<div id="ship-cursor"></div>
<div id="nav-placeholder"></div>
<div id="hamburger-placeholder"></div>
<div id="logo-placeholder"></div>

<div class="signup-wrap" id="signup-wrap">
  <h1 class="signup-title">회원가입</h1>
  <form id="signup-form">
    <section class="signup-section">
      <h2 class="signup-section-title">기본 정보</h2>
      <div class="form-field">
        <label class="form-label">이메일 (아이디) *</label>
        <input type="email" class="form-input" id="email" required placeholder="example@email.com">
      </div>
      <div class="form-field">
        <label class="form-label">비밀번호 * (8자 이상)</label>
        <input type="password" class="form-input" id="password" required minlength="8">
      </div>
      <div class="form-field">
        <label class="form-label">비밀번호 확인 *</label>
        <input type="password" class="form-input" id="password2" required>
      </div>
      <div class="form-field">
        <label class="form-label">이름 *</label>
        <input type="text" class="form-input" id="name" required placeholder="홍길동">
      </div>
      <div class="form-field">
        <label class="form-label">휴대전화</label>
        <input type="tel" class="form-input" id="mobile" inputmode="numeric" placeholder="010-0000-0000" maxlength="13">
      </div>
    </section>

    <section class="signup-section">
      <h2 class="signup-section-title">주소</h2>
      <div class="form-field">
        <label class="form-label">우편번호</label>
        <div class="form-row">
          <input type="text" class="form-input" id="postal" readonly placeholder="우편번호">
          <button type="button" class="postcode-btn" id="postcode-btn">검색</button>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">기본주소</label>
        <input type="text" class="form-input" id="address" readonly placeholder="주소 검색 후 자동 입력">
      </div>
      <div class="form-field">
        <label class="form-label">상세주소</label>
        <input type="text" class="form-input" id="address_detail" placeholder="동, 호수 등">
      </div>
    </section>

    <section class="signup-section">
      <h2 class="signup-section-title">약관 동의</h2>
      <label class="check-label"><input type="checkbox" id="agree_terms"> <span>[필수] 이용약관 동의</span></label>
      <label class="check-label"><input type="checkbox" id="agree_privacy"> <span>[필수] 개인정보 수집·이용 동의</span></label>
      <label class="check-label"><input type="checkbox" id="agree_marketing"> <span>[선택] 쇼핑정보 수신 동의</span></label>
    </section>

    <p class="form-error" id="signup-error" style="display:none"></p>
    <button type="submit" class="form-submit" id="signup-btn">가입하기</button>
    <p class="signup-login-link">이미 회원이신가요? <a href="/login.html">로그인</a></p>
  </form>
</div>

<script src="/js/config.js"></script>
<script>
// Phone format
document.getElementById('mobile').addEventListener('input', function () {
  this.value = formatMobile(this.value);
});

// Kakao postcode
document.getElementById('postcode-btn').addEventListener('click', () => {
  if (!window.daum) return;
  new daum.Postcode({
    oncomplete(data) {
      document.getElementById('postal').value = data.zonecode;
      document.getElementById('address').value = data.roadAddress || data.jibunAddress;
      document.getElementById('address_detail').focus();
    }
  }).open();
});

// Submit
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('signup-error');
  err.style.display = 'none';

  const pw  = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  if (pw !== pw2) { err.textContent = '비밀번호가 일치하지 않습니다.'; err.style.display='block'; return; }
  if (!document.getElementById('agree_terms').checked || !document.getElementById('agree_privacy').checked) {
    err.textContent = '필수 약관에 동의해주세요.'; err.style.display='block'; return;
  }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = '처리 중...';

  const res = await apiFetch(`${API}/signup.php`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email:          document.getElementById('email').value,
      password:       pw,
      name:           document.getElementById('name').value,
      mobile:         document.getElementById('mobile').value,
      postal_code:    document.getElementById('postal').value,
      address:        document.getElementById('address').value,
      address_detail: document.getElementById('address_detail').value,
    }),
  });

  if (res.ok) {
    document.getElementById('signup-wrap').innerHTML = `
      <div class="signup-done">
        <p class="signup-done-icon">👾</p>
        <h1 class="signup-done-title">가입이 완료되었습니다!</h1>
        <p class="signup-done-sub">아니아에 오신 걸 환영해요.<br>지금 바로 쇼핑을 시작하세요.</p>
        <a href="/index.html" class="signup-done-btn">홈으로 가기</a>
      </div>`;
  } else {
    err.textContent = res.error || '오류가 발생했습니다.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = '가입하기';
  }
});
</script>
<script src="/js/nav.js"></script>
<script src="/js/cursor.js"></script>
</body>
</html>
